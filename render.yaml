# ============================================================================
# render.yaml — Blueprint de **GDM ALMACÉN** (sistema de inventarios)
#
# Despliegue independiente en el repo anbeor29-oss/GDM_ALMACEN (rama main).
# Recursos propios; NO comparte NADA con producción de facturas (gdmfac-*).
#
#   1) PostgreSQL 15  → gdm-almacen-postgres  (plan de PAGO: ver nota abajo)
#   2) Backend Node   → gdm-almacen-backend
#   3) Frontend Vite  → gdm-almacen-frontend
#
# Uso: Render → New → Blueprint → repo GDM_ALMACEN → Branch: main → Apply.
# En el primer arranque corre migraciones y luego bootstrap:env (crea empresa +
# admin ADMIN_ALL). Secretos (SW_SAPIEN_TOKEN, BOOTSTRAP_ADMIN_PASSWORD) van
# sync:false (Render los pide en el Apply); nunca se guardan en git.
# ============================================================================

databases:
    # Plan de PAGO: Render solo permite 1 Postgres FREE por cuenta y ese lo usa
    # la producción de facturas. basic-256mb es el paquete de pago más barato
    # (~$6 USD/mes). Con `free` el Apply falla ("one active free tier database").
  - name: gdm-almacen-postgres
    plan: basic-256mb
    databaseName: gdm_almacen
    user: gdm_almacen
    postgresMajorVersion: 15
    ipAllowList: []

services:
  # ─── Backend Node/Express ──────────────────────────────────────────
  - type: web
    name: gdm-almacen-backend
    runtime: node
    plan: starter
    region: oregon
    branch: main
    rootDir: backend
    buildCommand: npm ci --include=dev && npm run build
    # migraciones (aborta si fallan) → bootstrap idempotente NO fatal → server.
    startCommand: "npm run migrate:up && npm run cp:seed && (npm run bootstrap:env || true) && node dist/index.js"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_VERSION
        value: v1
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: gdm-almacen-postgres
          property: connectionString
      - key: DB_SSL
        value: "true"
      - key: REDIS_HOST
        value: ""
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CSD_MASTER_KEY
        generateValue: true
      - key: JWT_EXPIRATION
        value: 1h
      - key: JWT_REFRESH_EXPIRATION
        value: 7d
      - key: PAC_PROVIDER
        value: SW_SAPIEN
      - key: SW_SAPIEN_ENV
        value: sandbox
      - key: SW_SAPIEN_TOKEN
        sync: false
      - key: CORS_ORIGIN
        value: "https://gdm-almacen-frontend.onrender.com"
      - key: CORS_CREDENTIALS
        value: "true"
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      - key: FEATURE_PAC_INTEGRATION
        value: "true"
      - key: MOCK_PAC
        value: "false"
      # ─── Bootstrap del primer arranque (empresa + admin) ────────────
      - key: BOOTSTRAP_ADMIN_EMAIL
        value: "admin@gdmalmacen.mx"
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: BOOTSTRAP_ADMIN_FIRST_NAME
        value: "Admin"
      - key: BOOTSTRAP_ADMIN_LAST_NAME
        value: "General"
      - key: BOOTSTRAP_COMPANY_RFC
        value: "EKU9003173C9"
      - key: BOOTSTRAP_COMPANY_NAME
        value: "GDM ALMACEN DEMO"
      - key: BOOTSTRAP_COMPANY_REGIME
        value: "601"
      - key: BOOTSTRAP_COMPANY_CP
        value: "20000"
      - key: BOOTSTRAP_COMPANY_STATE
        value: "01"

  # ─── Frontend React/Vite estático ──────────────────────────────────
  - type: web
    name: gdm-almacen-frontend
    runtime: static
    branch: main
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        fromService:
          name: gdm-almacen-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
